    (function () {
      var overlay = document.getElementById('overlay');
      var backdrop = document.getElementById('overlayBackdrop');
      var visualEl = document.getElementById('overlayVisual');
      var textEl = document.getElementById('overlayText');
      var counterEl = document.getElementById('overlayCounter');
      var prevBtn = document.getElementById('overlayPrev');
      var nextBtn = document.getElementById('overlayNext');
      var closeBtn = document.getElementById('overlayClose');
      var currentIndex = -1;

      function escapeHtml(s) {
        if (!s) return '';
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function localized(field, p) {
        if (!p[field]) return '';
        return p[field][currentLang] || p[field].fr || '';
      }

      var currentPhotos = []; // active project's photo URLs (normalized)
      var currentPhotoIdx = 0;

      function getPhotos(p) {
        // Normalize: photos array > photo string > none
        if (Array.isArray(p.photos) && p.photos.length) return p.photos.slice();
        if (p.photo) return [p.photo];
        return [];
      }

      function showPhoto(idx) {
        if (!currentPhotos.length) return;
        currentPhotoIdx = ((idx % currentPhotos.length) + currentPhotos.length) % currentPhotos.length;
        var imgs = visualEl.querySelectorAll('.overlay-visual-img');
        var dots = visualEl.querySelectorAll('.overlay-visual-dot');
        imgs.forEach(function (el, i) { el.classList.toggle('active', i === currentPhotoIdx); });
        dots.forEach(function (el, i) { el.classList.toggle('active', i === currentPhotoIdx); });
        var counter = visualEl.querySelector('.overlay-visual-counter');
        if (counter) counter.textContent = (currentPhotoIdx + 1) + ' / ' + currentPhotos.length;
      }
      function photoNext() { showPhoto(currentPhotoIdx + 1); }
      function photoPrev() { showPhoto(currentPhotoIdx - 1); }

      function renderOverlay(p) {
        // Visual: photo(s) or typographic poster
        currentPhotos = getPhotos(p);
        currentPhotoIdx = 0;

        if (currentPhotos.length) {
          visualEl.className = 'overlay-visual';
          // Build stacked image layers
          var html = '';
          currentPhotos.forEach(function (url, i) {
            html += '<div class="overlay-visual-img' + (i === 0 ? ' active' : '') +
              '" style="background-image: url(\'' + url + '\')"></div>';
          });
          // Click zones (only if multiple)
          if (currentPhotos.length > 1) {
            html += '<div class="overlay-visual-zones">' +
              '<button class="overlay-visual-zone prev" aria-label="previous photo"></button>' +
              '<button class="overlay-visual-zone next" aria-label="next photo"></button>' +
              '</div>';
            // Dots
            html += '<div class="overlay-visual-dots">';
            currentPhotos.forEach(function (_, i) {
              html += '<div class="overlay-visual-dot' + (i === 0 ? ' active' : '') + '"></div>';
            });
            html += '</div>';
            // Counter
            html += '<div class="overlay-visual-counter">1 / ' + currentPhotos.length + '</div>';
          }
          visualEl.innerHTML = html;
          // Wire click zones
          var zonePrev = visualEl.querySelector('.overlay-visual-zone.prev');
          var zoneNext = visualEl.querySelector('.overlay-visual-zone.next');
          if (zonePrev) zonePrev.addEventListener('click', photoPrev);
          if (zoneNext) zoneNext.addEventListener('click', photoNext);
        } else {
          visualEl.className = 'overlay-visual placeholder';
          visualEl.innerHTML =
            '<div class="poster-type">' + escapeHtml(getTypeLabel(p.type)) + '</div>' +
            '<div class="poster-title">' + escapeHtml(getTitle(p)) + '</div>' +
            '<div class="poster-year">' + escapeHtml(p.when) + '</div>';
        }

        // Meta blocks: type / when / where (where only if defined)
        var d = getDict();
        var metaBlocks = [
          { label: d.overlayTypeLabel || 'Type', value: getTypeLabel(p.type) },
          { label: d.overlayDateLabel || 'When', value: p.when }
        ];
        var place = localized('place', p);
        if (place) {
          metaBlocks.push({ label: d.overlayPlaceLabel || 'Where', value: place });
        }

        var metaHtml = '<div class="overlay-meta">' +
          metaBlocks.map(function (b) {
            return '<div class="overlay-meta-block footer-block">' +
              '<div class="footer-label">' + escapeHtml(b.label) + '</div>' +
              '<div class="footer-value">' + escapeHtml(b.value) + '</div>' +
              '</div>';
          }).join('') + '</div>';

        textEl.innerHTML =
          metaHtml +
          '<h2 class="overlay-title">' + escapeHtml(getTitle(p)) + '</h2>' +
          '<div class="overlay-desc">' + escapeHtml(localized('desc', p)) + '</div>';

        counterEl.textContent = (currentIndex + 1).toString().padStart(2, '0') + ' / ' +
          projects.length.toString().padStart(2, '0');
      }

      function open(index) {
        currentIndex = ((index % projects.length) + projects.length) % projects.length;
        renderOverlay(projects[currentIndex]);
        overlay.classList.add('open');
        overlay.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }
      function close() {
        overlay.classList.remove('open');
        overlay.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        currentIndex = -1;
      }
      function next() { if (currentIndex >= 0) open(currentIndex + 1); }
      function prev() { if (currentIndex >= 0) open(currentIndex - 1); }

      // Card click — delegate from rail
      var rail = document.getElementById('rail');
      rail.addEventListener('click', function (e) {
        var card = e.target.closest('.card');
        if (!card || rail.classList.contains('dragging')) return;
        var idx = parseInt(card.getAttribute('data-index'), 10);
        if (!isNaN(idx)) {
          e.preventDefault();
          open(idx);
        }
      });
      // Keyboard activation for card-as-button
      rail.addEventListener('keydown', function (e) {
        var card = e.target.closest('.card');
        if (!card) return;
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          var idx = parseInt(card.getAttribute('data-index'), 10);
          if (!isNaN(idx)) open(idx);
        }
      });

      backdrop.addEventListener('click', close);
      closeBtn.addEventListener('click', close);
      nextBtn.addEventListener('click', next);
      prevBtn.addEventListener('click', prev);
      window.addEventListener('keydown', function (e) {
        if (!overlay.classList.contains('open')) return;
        if (e.key === 'Escape') close();
        else if (e.key === 'ArrowRight') next();
        else if (e.key === 'ArrowLeft') prev();
      });

      // Re-render overlay when language switches (if open)
      window.addEventListener('langChange', function () {
        if (currentIndex >= 0) renderOverlay(projects[currentIndex]);
      });
    })();

    /* =====================================================
       LEGAL-NOTICE OVERLAY
       Reuses .overlay panel CSS (same motion, same chrome).
       The footer "Mentions légales" link toggles it; Esc, backdrop,
       and × close it. No prev/next, no keyboard arrows — single doc.
       ===================================================== */
    (function () {
      var legalOverlay = document.getElementById('legalOverlay');
      var legalBackdrop = document.getElementById('legalBackdrop');
      var legalClose = document.getElementById('legalClose');
      if (!legalOverlay || !legalBackdrop || !legalClose) return;

      // Feature-detect: in sandboxed iframes (about:srcdoc previews,
      // some embedded contexts) history.replaceState throws a SecurityError
      // because the document has an opaque origin. We still want the
      // overlay to work — just without URL syncing. On the real deployed
      // site, this passes the test and deep-linking works as designed.
      var canSyncUrl = false;
      try {
        history.replaceState(history.state, '', location.href);
        canSyncUrl = true;
      } catch (e) {
        canSyncUrl = false;
      }

      function setHash(hash) {
        if (!canSyncUrl) return;
        try {
          if (hash) {
            if (location.hash !== hash) history.replaceState(null, '', hash);
          } else {
            history.replaceState(null, '', location.pathname + location.search);
          }
        } catch (e) {
          // Origin restrictions can change at runtime in some embedders.
          // Fail silently rather than break the overlay.
        }
      }

      function open() {
        legalOverlay.classList.add('open');
        legalOverlay.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        // Move focus to the close button for keyboard users
        setTimeout(function () { legalClose.focus(); }, 50);
        // Reflect open state in the URL so the page is shareable.
        setHash('#legal');
      }
      function close() {
        legalOverlay.classList.remove('open');
        legalOverlay.setAttribute('aria-hidden', 'true');
        // Only release scroll lock if no other overlay is open
        var projectOverlay = document.getElementById('overlay');
        if (!projectOverlay || !projectOverlay.classList.contains('open')) {
          document.body.style.overflow = '';
        }
        // Strip the #legal hash if it's still there
        if (location.hash === '#legal') {
          setHash('');
        }
      }

      // The legal link in the footer is an <a data-i18n="legalLink"> with
      // no href. We pick it up by its data-i18n attribute so we don't
      // depend on adding new HTML classes.
      var legalLinks = document.querySelectorAll('a[data-i18n="legalLink"]');
      legalLinks.forEach(function (a) {
        a.style.cursor = 'pointer';
        a.addEventListener('click', function (e) {
          e.preventDefault();
          open();
        });
      });

      legalBackdrop.addEventListener('click', close);
      legalClose.addEventListener('click', close);
      window.addEventListener('keydown', function (e) {
        if (!legalOverlay.classList.contains('open')) return;
        if (e.key === 'Escape') close();
      });

      // Deep-link: if the page loads with #legal, open the overlay.
      // Also react to hashchange (back/forward buttons).
      // Skip when URL syncing isn't possible — there's nothing to react to.
      if (canSyncUrl) {
        function syncFromHash() {
          if (location.hash === '#legal') {
            if (!legalOverlay.classList.contains('open')) open();
          } else {
            if (legalOverlay.classList.contains('open')) close();
          }
        }
        window.addEventListener('hashchange', syncFromHash);
        // Run once on load — defer to next tick so i18n has populated the body
        setTimeout(syncFromHash, 0);
      }
    })();

    /* =====================================================
       UNIFIED WHEEL PHYSICS
       =====================================================
       One state variable: ω (angular velocity, rad/sec).
       Both the waterwheel and the project rail are projections of ω.

         wheel.rotation += ω · dt
         track.x        += ω · R · dt           (R = effective radius in px)

       Inputs that add impulse to ω:
         · page scroll       (deltaY → impulse)
         · rail drag         (pointer dx → impulse)
         · rail wheel-event  (deltaX/Y → impulse)
         · arrow buttons     (one-card kick)

       Idle behavior: ω relaxes toward ω_idle (small positive value),
       so the rail always drifts back to "rightward" after interaction.
       Drag can push ω negative — the wheel literally spins backward
       and the rail moves backward too. Release: friction pulls back to
       ω_idle. This is the "compromise" requested: visually defaults to
       rightward, but drag/wheel can push backward freely.

       Loop: track has 3 copies of the cards. Position is reduced
       modulo (one-copy width), so the rail is seamlessly infinite in
       both directions. ===================================================== */

    (function () {
      var rail   = document.getElementById('rail');
      var track  = document.getElementById('railTrack');
      var prev   = document.getElementById('prevBtn');
      var next   = document.getElementById('nextBtn');
      var wheelG = document.querySelector('.wheel-spin');
      if (!rail || !track || !wheelG) return;

      // ---------- physics constants ----------
      // ω is in radians per millisecond.
      // Idle: 20s per revolution = 2π / 20000 ≈ 0.000314 rad/ms.
      var OMEGA_IDLE = (2 * Math.PI) / 20000;
      // Cap: ~3s per revolution under sustained heavy scroll.
      var OMEGA_MAX  = (2 * Math.PI) / 3000;

      // Effective radius: how many pixels of rail movement per radian
      // of wheel rotation. Tuned so idle drift = ~15 px/sec (matches old).
      // 15 px/sec ÷ ω_idle (rad/ms) = 15 / (1000 · ω_idle) px/rad
      var R_EFFECTIVE = 15 / (1000 * OMEGA_IDLE); // ≈ 47.7 px/rad

      // Friction toward idle. Critical-damping-like exponential decay.
      // Half-life ~600ms — heavy waterwheel feel.
      var FRICTION_HALF_LIFE_MS = 600;
      var FRICTION_K = Math.log(2) / FRICTION_HALF_LIFE_MS;

      // Impulse scaling — calibrated so typical gestures map to a sensible
      // fraction of OMEGA_MAX, and you can FEEL the difference between a
      // gentle nudge and a vigorous swipe. (Earlier values were ~400×
      // larger and pinned ω to the clamp on every event, making the rail
      // feel one-speed regardless of input magnitude.)
      //
      // Page scroll: a full screenful (~1000px) should spin the wheel up
      // to ~OMEGA_MAX. So per-pixel ω = OMEGA_MAX / 1000.
      var IMPULSE_PER_PAGE_PX = OMEGA_MAX / 1000;
      // Rail trackpad/wheel: ~25× more direct than page scroll. A normal
      // two-finger swipe (~100px of accumulated deltaX over ~5 frames)
      // produces a clearly visible advance of one card.
      var IMPULSE_PER_RAIL_PX = IMPULSE_PER_PAGE_PX * 25;

      // ---------- state ----------
      var omega = OMEGA_IDLE;       // angular velocity, rad/ms
      var theta = 0;                // wheel angle, radians
      var trackX = 0;               // track position (px, can be negative)
      var copyWidth = 0;            // width of ONE copy of the card list
      var hovering = false;
      var isDragging = false;
      var dragLastX = 0, dragLastT = 0;
      var pageLastY = window.scrollY;
      var pageLastT = performance.now();
      var lastFrameT = performance.now();

      // Reduced motion: just hold ω at zero, no idle drift, no impulses.
      var reduceMotion = window.matchMedia &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduceMotion) {
        OMEGA_IDLE = 0;
        omega = 0;
      }

      // ---------- layout ----------
      function measure() {
        // Total track width = 3 copies. One copy = total / 3.
        copyWidth = track.scrollWidth / 3;
        // Center the position into the middle copy so we have headroom
        // in both directions before wrapping.
        trackX = wrap(trackX);
      }
      function wrap(x) {
        if (copyWidth <= 0) return x;
        // Reduce x into the range (-copyWidth, 0]. The middle copy then
        // shows from offset 0 of the second copy, which is identical to
        // offset copyWidth of the first — so the visible result is seamless.
        var w = copyWidth;
        x = x % w;
        if (x > 0) x -= w;
        return x;
      }
      window.__railOnLayout = function () {
        // Re-measure on next frame, after DOM has settled
        requestAnimationFrame(measure);
      };
      window.addEventListener('resize', measure);
      // Initial measure: cards/fonts may still be loading; remeasure shortly.
      measure();
      setTimeout(measure, 100);
      setTimeout(measure, 600);

      // ---------- input: page scroll ----------
      // Every scroll event adds an impulse proportional to delta-y.
      window.addEventListener('scroll', function () {
        var now = performance.now();
        var y = window.scrollY;
        var dy = y - pageLastY;
        pageLastY = y;
        pageLastT = now;
        if (reduceMotion) return;
        // Sign convention: scrolling down (dy > 0) spins wheel forward
        // (ω positive → rail moves right at rest, but track-position
        // moves left in screen coords; see render step). Either sign
        // adds *magnitude* — page scroll is unsigned spin-up.
        var impulse = Math.abs(dy) * IMPULSE_PER_PAGE_PX;
        omega += impulse * Math.sign(OMEGA_IDLE || 1); // bias to forward
        if (omega > OMEGA_MAX) omega = OMEGA_MAX;
        if (omega < -OMEGA_MAX) omega = -OMEGA_MAX;
      }, { passive: true });

      // ---------- input: drag ----------
      function startDrag(x) {
        isDragging = true;
        rail.classList.add('dragging');
        dragLastX = x;
        dragLastT = performance.now();
      }
      function moveDrag(x) {
        if (!isDragging) return;
        var now = performance.now();
        var dt = Math.max(now - dragLastT, 1);
        var dx = x - dragLastX;
        dragLastX = x;
        dragLastT = now;
        // Drag right (dx > 0) means user pulls track right → reveals earlier
        // cards → wheel must spin BACKWARD. So ω target opposite sign of dx.
        // We set ω directly during drag (overriding friction) so the wheel
        // tracks the hand 1:1. Magnitude: dx/dt is px/ms, divide by R for ω.
        omega = -(dx / dt) / R_EFFECTIVE;
        // Clamp to a sane range — fast flicks shouldn't make wheel a blur.
        var hardCap = OMEGA_MAX * 3;
        if (omega > hardCap) omega = hardCap;
        if (omega < -hardCap) omega = -hardCap;
      }
      function endDrag() {
        if (!isDragging) return;
        isDragging = false;
        rail.classList.remove('dragging');
        // ω keeps whatever value it had at release — friction takes over.
      }
      rail.addEventListener('mousedown', function (e) {
        startDrag(e.pageX);
        e.preventDefault();
      });
      window.addEventListener('mouseup', endDrag);
      window.addEventListener('mousemove', function (e) { moveDrag(e.pageX); });
      rail.addEventListener('touchstart', function (e) {
        startDrag(e.touches[0].pageX);
      }, { passive: true });
      rail.addEventListener('touchmove', function (e) {
        moveDrag(e.touches[0].pageX);
      }, { passive: true });
      rail.addEventListener('touchend', endDrag);
      rail.addEventListener('touchcancel', endDrag);

      // ---------- input: wheel event (trackpad on the rail) ----------
      // Horizontal trackpad gestures arrive in different shapes on different
      // OS / browsers:
      //   · macOS Safari/Chrome: horizontal swipe → deltaX (clean)
      //   · Windows precision touchpad: often deltaX, but momentum tail can
      //     have small deltaY noise
      //   · Some browsers translate two-finger horizontal as Shift+deltaY
      //   · Trackpoints / mice with tilt-wheel: deltaX
      // We treat the gesture as horizontal whenever the horizontal component
      // dominates OR Shift is held. Otherwise (clean vertical) we let the
      // page scroll — the page-scroll listener already feeds ω from that.
      rail.addEventListener('wheel', function (e) {
        var dx = e.deltaX;
        var dy = e.deltaY;
        var horizontal;
        if (e.shiftKey) {
          // Shift+wheel convention: vertical wheel means horizontal scroll.
          horizontal = dy || dx;
        } else if (Math.abs(dx) >= Math.abs(dy) * 0.5) {
          // Horizontal-dominant or roughly-diagonal trackpad gesture:
          // take the horizontal component. The 0.5 ratio is loose on
          // purpose — diagonal swipes still feel responsive instead of
          // bleeding into the page scroll.
          horizontal = dx;
        } else {
          // Clean vertical scroll → let page handle it; ω will be fed
          // by the window 'scroll' listener.
          return;
        }
        if (Math.abs(horizontal) < 0.5) return;
        omega += horizontal * IMPULSE_PER_RAIL_PX;
        if (omega > OMEGA_MAX * 2) omega = OMEGA_MAX * 2;
        if (omega < -OMEGA_MAX * 2) omega = -OMEGA_MAX * 2;
        e.preventDefault();
      }, { passive: false });

      // ---------- input: arrow buttons ----------
      // Each click adds enough impulse to advance roughly one card.
      function step(dir) {
        var card = rail.querySelector('.card');
        var cardW = card ? card.offsetWidth + 32 : 380;
        // We want the track to move cardW px over ~500ms.
        // distance = ω · R · t → ω = dist / (R · t)
        var targetOmega = (cardW / R_EFFECTIVE) / 500 * dir;
        // Add to existing ω so spamming the button accelerates.
        omega += targetOmega;
        var cap = OMEGA_MAX * 2;
        if (omega > cap) omega = cap;
        if (omega < -cap) omega = -cap;
      }
      prev.addEventListener('click', function () { step(-1); });
      next.addEventListener('click', function () { step(1); });

      // ---------- pause idle drift on hover ----------
      rail.addEventListener('mouseenter', function () { hovering = true; });
      rail.addEventListener('mouseleave', function () { hovering = false; });

      // ---------- the integrator ----------
      function frame(now) {
        var dt = Math.min(now - lastFrameT, 50); // cap dt to avoid tab-switch jumps
        lastFrameT = now;

        if (!reduceMotion) {
          if (isDragging) {
            // ω is being driven directly by moveDrag; don't apply friction.
          } else {
            // Friction pulls ω toward target. Target is ω_idle when not
            // hovering, and 0 when hovering (so user can read).
            var target = hovering ? 0 : OMEGA_IDLE;
            // Exponential approach: ω = target + (ω - target) · e^(-k·dt)
            var decay = Math.exp(-FRICTION_K * dt);
            omega = target + (omega - target) * decay;
          }
        }

        // Integrate
        theta += omega * dt;
        trackX -= omega * R_EFFECTIVE * dt; // negative: ω+ → track moves left → cards appear from right
        trackX = wrap(trackX);

        // Apply
        // Wheel: rotate around its center. Convert rad to deg.
        var deg = (theta * 180 / Math.PI) % 360;
        wheelG.setAttribute('transform', 'rotate(' + deg.toFixed(2) + ' 20 77)');
        // Track: translate3d for GPU compositing.
        track.style.transform = 'translate3d(' + trackX.toFixed(2) + 'px, 0, 0)';

        requestAnimationFrame(frame);
      }
      lastFrameT = performance.now();
      requestAnimationFrame(frame);
    })();

    /* =====================================================
       MORPHING BRAND — heavy mechanical easing
       =====================================================
       Tracks scrollY in real time (no chase, no lag — that read as
       "broken / slow"). The "heavy" feel comes from a single eased
       curve applied to scroll progress: resistance at the start, plunge
       through the middle, firm seat at the end. Same curve shape as
       a mechanical lever fighting inertia.

       Three scroll-driven properties (brand transform, title opacity,
       meta translate+opacity) all use the SAME curve, so they read
       as one synchronised system rather than three independent eases.
       This is the visual analogue of the waterwheel's physical mass:
       the wheel is actually heavy; the hero just moves like it is. */
    (function () {
      var heroBrand = document.getElementById('heroBrand');
      var heroSvg = heroBrand ? heroBrand.querySelector('.hero-mark') : null;
      var spacer = document.getElementById('heroBrandSpacer');
      var heroTitle = document.getElementById('heroTitle');
      var heroMeta = document.querySelector('.hero-meta');
      if (!heroBrand || !spacer || !heroSvg) return;

      var startLeft = 0, startTop = 0;
      var startSize = 0;
      // End-state of the morph is now measured from the actual header
      // panel, not hardcoded — so the shrunken logo always lands on
      // exactly the same horizontal line as the FR/EN + nav block,
      // and is exactly the same visual height as that block. Reads
      // as a single chrome strip across all viewport widths.
      var endLeft = 32;
      var endTop = 22;
      var endSize = 44;
      var measured = false;
      // The header panel is what we align to. Measured fresh inside
      // measure() (and re-measured on resize) because it changes
      // between desktop and mobile breakpoints.
      var headerRight = document.querySelector('.header-right');

      function measure() {
        heroBrand.style.transform = '';
        var svgR = heroSvg.getBoundingClientRect();
        startSize = svgR.height;
        var spacerR = spacer.getBoundingClientRect();
        startLeft = spacerR.left;
        startTop = spacerR.top + window.scrollY;

        // Pin the morph end-state to the header's geometry: same
        // top, same height, mirrored gutter on the left. The SVG's
        // intrinsic aspect ratio is 98/82 and it sits inside a
        // viewBox padded by 12px on the left (-12 origin), so the
        // visible building+wheel is roughly a square inside the SVG
        // bounding box. We use header height directly as endSize —
        // SVG is height-driven, width follows aspect-ratio.
        //
        // IMPORTANT: the header is position:fixed, so its
        // getBoundingClientRect() is already in viewport coords —
        // we do NOT add scrollY here. The hero-brand is also
        // position:fixed, so its transform is viewport-relative,
        // and the end target must be too. (Contrast with startTop
        // above, which IS document-relative because the spacer is
        // a normally-flowed element inside the hero section.)
        if (headerRight) {
          var headerR = headerRight.getBoundingClientRect();
          endTop = headerR.top;
          endSize = headerR.height;
          // Match the header's own gutter: header sits at
          // left = var(--gutter) on desktop, 12px on mobile. We
          // read the header's actual left edge so we don't have
          // to know the breakpoint here.
          var headerEl = headerRight.parentElement;
          if (headerEl) {
            var headerElR = headerEl.getBoundingClientRect();
            endLeft = headerElR.left;
          }
        }
        measured = true;
      }

      // Cubic bezier evaluator. We ease scroll progress through a
      // "heavy mechanical" curve: cubic-bezier(0.85, 0, 0.15, 1).
      //   - x1=0.85, y1=0   → strong resistance at the start (the lever
      //                        almost doesn't want to move)
      //   - x2=0.15, y2=1   → firm seat at the end (lands plant-flat,
      //                        no overshoot, no bounce)
      // Solving the parametric Bezier x(t) for t given x is done with
      // a few Newton-Raphson iterations — fast and accurate enough.
      function bezierY(x, x1, y1, x2, y2) {
        if (x <= 0) return 0;
        if (x >= 1) return 1;
        // Coefficients of the parametric polynomials
        var cx = 3 * x1, bx = 3 * (x2 - x1) - cx, ax = 1 - cx - bx;
        var cy = 3 * y1, by = 3 * (y2 - y1) - cy, ay = 1 - cy - by;
        // Newton-Raphson to solve x(t) = x for t
        var t = x;
        for (var i = 0; i < 5; i++) {
          var xt = ((ax * t + bx) * t + cx) * t - x;
          var dxt = (3 * ax * t + 2 * bx) * t + cx;
          if (Math.abs(dxt) < 1e-6) break;
          t = t - xt / dxt;
          if (t < 0) t = 0; else if (t > 1) t = 1;
        }
        return ((ay * t + by) * t + cy) * t;
      }

      function ease(p) {
        // The "heavy mechanical" curve. If you want a softer feel, push
        // x1 toward 0.7 and x2 toward 0.3. Heavier still: 0.9 / 0.1.
        return bezierY(p, 0.85, 0, 0.15, 1);
      }

      function update() {
        if (!measured) measure();
        var vh = window.innerHeight;
        var s = window.scrollY;
        var p = Math.min(1, Math.max(0, s / (vh * 0.7)));
        var pe = ease(p);

        var scale = 1 + (endSize / startSize - 1) * pe;
        var currentLeft = startLeft + (endLeft - startLeft) * pe;
        var currentTop = (startTop - s) + (endTop - (startTop - s)) * pe;

        heroBrand.style.transform =
          'translate3d(' + currentLeft.toFixed(2) + 'px, ' + currentTop.toFixed(2) + 'px, 0)' +
          ' scale(' + scale.toFixed(4) + ')';

        // Title fade — same curve, slightly different range so the title
        // is visibly present in the early "resistance" zone of the morph.
        if (heroTitle) {
          var titleP = Math.min(1, Math.max(0, (p - 0.05) / 0.65));
          heroTitle.style.opacity = (1 - ease(titleP)).toFixed(3);
        }

        // Meta: same eased progress drives both translate and opacity,
        // so they move in lockstep with the brand.
        if (heroMeta) {
          heroMeta.style.transform = 'translate3d(0,' + (pe * 28).toFixed(2) + 'px, 0)';
          heroMeta.style.opacity = Math.max(0, 1 - pe * 1.4).toFixed(3);
        }
      }

      function remeasureAndUpdate() { measured = false; update(); }

      window.addEventListener('scroll', update, { passive: true });
      window.addEventListener('resize', remeasureAndUpdate);
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(function () {
          remeasureAndUpdate();
          setTimeout(remeasureAndUpdate, 150);
        });
      }
      setTimeout(remeasureAndUpdate, 600);
      setTimeout(remeasureAndUpdate, 1500);
      remeasureAndUpdate();
    })();

    /* =====================================================
       LANG SWITCH — wire up buttons and initialise FR
       ===================================================== */
    (function () {
      var btns = document.querySelectorAll('.lang-switch [data-lang]');
      btns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var lang = btn.getAttribute('data-lang');
          if (lang && lang !== currentLang) applyLang(lang);
        });
      });
      applyLang('fr');
    })();

  </script>
</body>
</html>
