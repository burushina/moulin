<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moulin Méli Mêl’eaux</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..500,30..100&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Modular scale ~1.5× — perceptually even spacing */
    --s-1: 8px;     /* hairline */
    --s-2: 12px;    /* tight */
    --s-3: 16px;    /* small */
    --s-4: 24px;    /* base */
    --s-5: 32px;    /* medium */
    --s-6: 48px;    /* large */
    --s-7: 72px;    /* xl */
    --s-8: 96px;    /* 2xl */
    --s-9: 120px;   /* section padding */
    --s-10: 144px;  /* hero padding */

    --gutter: 32px;
    --column: 1280px;

    --bg: #FFFFFF;
    --ink: #0E0C09;
    --ink-soft: rgba(14, 12, 9, 0.55);
    --ink-faint: rgba(14, 12, 9, 0.18);
    --ink-ghost: rgba(14, 12, 9, 0.06);

    --on-dark: #FFFFFF;
    --on-dark-soft: rgba(255, 255, 255, 0.6);

    /* MOTION SYSTEM — mechanical latch
       The whole site reacts like the inside of an old waterwheel mill:
       a switch *catches* into place fast, then the spring holds it; on
       release the spring pushes back with hysteresis. One language, two
       directions:

         --ease-snap     fast start, soft seat — the latch grabbing
                         (used on hover-in, on press-down, on activation)
         --ease-release  soft start, firm finish — the spring pushing
                         the part back to rest (used on hover-out, on lift)

       Asymmetric durations match real hardware: snap is quicker than
       release. Both are short enough to feel mechanical (not animated). */
    --ease-snap:    cubic-bezier(0.2, 0.9, 0.3, 1);
    --ease-release: cubic-bezier(0.4, 0, 0.7, 0.2);
    --dur-snap:    140ms;   /* hover-in, press-down — the catch */
    --dur-release: 220ms;   /* hover-out, lift — the spring */
    --dur-reveal:  640ms;   /* large reveals (overlay slide) — kept long */
  }

  /* Smooth scroll baseline */
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Geist', -apple-system, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  ::selection { background: var(--ink); color: var(--bg); }

  .container {
    width: 100%;
    max-width: calc(var(--column) + var(--gutter) * 2);
    margin: 0 auto;
    padding-left: var(--gutter);
    padding-right: var(--gutter);
  }

  /* =====================================================
     HEADER — only nav (logo is the morphed hero-brand)
     ===================================================== */
  .header {
    position: fixed;
    top: var(--s-4);
    left: var(--gutter);
    right: var(--gutter);
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
  }
  .header > * { pointer-events: auto; }
  .header-spacer {
    /* invisible, just used to anchor the morph target */
    width: 1px;
    height: 1px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: var(--s-4);
    padding: 8px 16px;
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--ink);
  }
  .lang-switch {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  /* =====================================================
     LINK INTERACTIONS — one global pattern
     ---------------------------------------------------
     Every text-link in the site (header nav, language switch, footer
     contacts) uses the same hover language: a 0.5px underline that
     catches in left-to-right (snap) and releases right-to-left (spring).
     Active state (current page / current language) is shown as a
     persistent underline. Press = 1px settle.

     Buttons-with-borders (arrows, overlay close) use the *other* register
     — full ink fill on hover. Two clear vocabularies for two clear roles.
     ===================================================== */
  /* The shared selector group: every text-link element in the site.
     Three locations get this treatment: header nav (a), lang switch
     (button), footer (a). They behave identically. */
  .header-nav a,
  .lang-switch button,
  .footer-value a {
    position: relative;
    display: inline-block;
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    background: transparent;
    border: 0;
    transition: color var(--dur-release) var(--ease-release),
                transform var(--dur-release) var(--ease-release);
  }
  .header-nav a::after,
  .lang-switch button::after,
  .footer-value a::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: -3px;
    height: 0.5px;
    background: currentColor;
    transform: scaleX(0);
    transform-origin: right center;
    transition: transform var(--dur-release) var(--ease-release);
  }
  .header-nav a:hover,
  .lang-switch button:not(.active):hover,
  .footer-value a:hover {
    color: var(--ink);
    transition: color var(--dur-snap) var(--ease-snap),
                transform var(--dur-snap) var(--ease-snap);
  }
  .header-nav a:hover::after,
  .lang-switch button:not(.active):hover::after,
  .lang-switch button.active::after,
  .footer-value a:hover::after {
    transform: scaleX(1);
    transform-origin: left center;
    transition: transform var(--dur-snap) var(--ease-snap);
  }
  .header-nav a:active,
  .lang-switch button:active,
  .footer-value a:active {
    transform: translateY(1px);
  }

  /* Lang-switch: inactive language is dimmed, active is full ink with
     a persistent underline (rendered by the rule above). The button
     also inherits the typographic settings of its container. */
  .lang-switch button {
    padding: 2px 0;
    color: var(--ink-soft);
    font: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
  }
  .lang-switch button.active { color: var(--ink); }
  .lang-switch .sep { color: var(--ink-soft); opacity: 0.5; }

  /* Footer link gets one extra detail beyond the shared underline: a small
     arrow sliding in from the right on hover. Same vocabulary as the
     project cards (a directional symbol that hints at "go"), scaled down
     for inline text. The padding-right reserves space so layout doesn't
     shift on hover. */
  .footer-value a {
    padding-right: 0.9em;
  }
  .footer-value a::before {
    content: "→";
    position: absolute;
    right: 0;
    top: 50%;
    transform: translate(4px, -50%);
    opacity: 0;
    transition: opacity var(--dur-release) var(--ease-release),
                transform var(--dur-release) var(--ease-release);
    pointer-events: none;
  }
  .footer-value a:hover::before {
    opacity: 1;
    transform: translate(0, -50%);
    transition: opacity var(--dur-snap) var(--ease-snap),
                transform var(--dur-snap) var(--ease-snap);
  }

  /* Anchor placeholders without href (e.g. unsupplied future links)
     shouldn't pretend to be clickable. Exception: links wired to a JS
     handler (the legal-notice trigger) are explicitly opted back in. */
  .footer-value a:not([href]):not([data-i18n="legalLink"]),
  .header-nav a:not([href]) {
    cursor: default;
  }
  .footer-value a:not([href]):not([data-i18n="legalLink"])::after,
  .header-nav a:not([href])::after,
  .footer-value a:not([href]):not([data-i18n="legalLink"])::before {
    display: none;
  }
  .footer-value a:not([href]):not([data-i18n="legalLink"]):hover,
  .header-nav a:not([href]):hover {
    color: var(--ink); /* no change from base */
    transition: none;
  }
  .footer-value a:not([href]):not([data-i18n="legalLink"]):active,
  .header-nav a:not([href]):not([data-i18n="legalLink"]):active {
    transform: none;
  }

  .header-nav {
    display: flex;
    gap: var(--s-3);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* =====================================================
     HERO — logo + name + one descriptive line
     ===================================================== */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: var(--s-10) var(--gutter);
  }
  .hero-inner {
    width: 100%;
    max-width: var(--column);
    margin: 0 auto;
  }
  /* Floating fixed brand block: logo + title travel together */
  .hero-brand {
    position: fixed;
    top: 0;
    left: 0;
    /* Single source of truth for the whole brand block.
       Font size, logo height, and gap are all derived from this. */
    --brand-size: clamp(48px, 6vw, 82px);
    --brand-gap: calc(var(--brand-size) * 0.6);
    display: flex;
    align-items: center;
    gap: var(--brand-gap);
    transform-origin: top left;
    will-change: transform;
    z-index: 90;
    pointer-events: none;
  }
  /* Logo height = three lines of hero-title (font-size × line-height × 3),
     so the mark optically equals the title block. Width derived from aspect-ratio. */
  .hero-mark {
    flex-shrink: 0;
    display: block;
    height: calc(var(--brand-size) * 0.98 * 3);
    width: auto;
    aspect-ratio: 98 / 82;
  }
  .hero-title {
    font-family: 'Fraunces', serif;
    font-weight: 350;
    font-variation-settings: 'opsz' 144, 'SOFT' 30;
    font-size: var(--brand-size);
    line-height: 0.98;
    letter-spacing: -0.02em;
    margin: 0;
    white-space: nowrap;
    will-change: opacity;
  }
  /* Spacer in hero-inner reserves space matching the brand block's natural size */
  .hero-brand-spacer {
    --brand-size: clamp(48px, 6vw, 82px);
    --brand-gap: calc(var(--brand-size) * 0.6);
    display: flex;
    align-items: center;
    gap: var(--brand-gap);
    margin-bottom: var(--s-5);
    visibility: hidden;
    pointer-events: none;
  }
  .spacer-mark {
    flex-shrink: 0;
    height: calc(var(--brand-size) * 0.98 * 3);
    width: auto;
    aspect-ratio: 98 / 82;
  }
  .spacer-title {
    font-family: 'Fraunces', serif;
    font-weight: 350;
    font-variation-settings: 'opsz' 144, 'SOFT' 30;
    font-size: var(--brand-size);
    line-height: 0.98;
    letter-spacing: -0.02em;
  }
  .hero-meta {
    font-family: 'Geist', sans-serif;
    font-weight: 400;
    font-size: clamp(17px, 1.6vw, 22px);
    line-height: 1.5;
    letter-spacing: -0.005em;
    color: var(--ink);
    max-width: 48ch;
    margin: 0;
    will-change: transform, opacity;
  }

  /* =====================================================
     EDITORIAL SECTIONS — Le lieu, Le moulin
     Same headline scale as projects-headline; prose body
     ===================================================== */
  .editorial {
    padding: var(--s-9) var(--gutter);
    border-top: 1px solid var(--ink);
  }
  .editorial-inner {
    max-width: 1280px;
    margin: 0 auto;
  }
  .editorial-headline {
    font-family: 'Fraunces', serif;
    font-weight: 350;
    font-variation-settings: 'opsz' 144, 'SOFT' 30;
    font-size: clamp(32px, 3.7vw, 53px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin: 0 0 var(--s-5) 0;
  }
  .editorial-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(24px, 4vw, 80px);
    max-width: 1100px;
  }
  @media (max-width: 720px) {
    .editorial-body { grid-template-columns: 1fr; }
  }
  .editorial-body p {
    font-family: 'Geist', sans-serif;
    font-weight: 400;
    font-size: clamp(17px, 1.6vw, 22px);
    line-height: 1.5;
    letter-spacing: -0.005em;
    color: var(--ink);
    margin: 0 0 1em 0;
  }
  .editorial-body p:last-child { margin-bottom: 0; }

  /* =====================================================
     PROJECTS — column-bound rail, light cards
     ===================================================== */
  .projects {
    padding: var(--s-9) 0;
    background: var(--bg);
    border-top: 1px solid var(--ink);
  }
  .projects-head {
    max-width: var(--column);
    margin: 0 auto var(--s-7) auto;
    padding: 0 var(--gutter);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: var(--s-4);
  }
  .projects-headline {
    font-family: 'Fraunces', serif;
    font-weight: 350;
    font-variation-settings: 'opsz' 144, 'SOFT' 30;
    font-size: clamp(32px, 3.7vw, 53px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .projects-headline em {
    font-style: italic;
    font-variation-settings: 'opsz' 144, 'SOFT' 60;
  }
  .projects-controls {
    display: flex;
    align-items: center;
    gap: var(--s-3);
    color: var(--ink);
  }
  .arrow-btn {
    background: transparent;
    border: 1px solid var(--ink);
    cursor: pointer;
    width: 40px;
    height: 40px;
    color: var(--ink);
    font-family: 'Geist', sans-serif;
    font-size: 16px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    /* Default state = "released". Spring is letting the button rest. */
    transition: background var(--dur-release) var(--ease-release),
                color var(--dur-release) var(--ease-release),
                transform var(--dur-release) var(--ease-release);
  }
  .arrow-btn span {
    display: inline-block;
    transition: transform var(--dur-release) var(--ease-release);
  }
  /* Hover = latch catches. Faster, harder. */
  .arrow-btn:hover {
    background: var(--ink);
    color: var(--bg);
    transition: background var(--dur-snap) var(--ease-snap),
                color var(--dur-snap) var(--ease-snap),
                transform var(--dur-snap) var(--ease-snap);
  }
  .arrow-btn:hover span {
    transition: transform var(--dur-snap) var(--ease-snap);
  }
  .arrow-btn.prev:hover span { transform: translateX(-4px); }
  .arrow-btn.next:hover span { transform: translateX(4px); }
  /* Press = button physically drops into its socket. */
  .arrow-btn:active { transform: translateY(2px); }
  .arrow-btn.prev:active span { transform: translateX(-6px); }
  .arrow-btn.next:active span { transform: translateX(6px); }
  .arrow-btn:disabled {
    cursor: default;
    background: transparent;
    color: var(--ink-faint);
    /* Border stays 100% ink — structure shouldn't fade */
  }
  .arrow-btn:disabled:hover {
    background: transparent;
    color: var(--ink-faint);
  }
  .arrow-btn:disabled:hover span { transform: none; }
  .arrow-btn:disabled:active { transform: none; }
  .arrow-group { display: flex; gap: var(--s-1); align-items: center; }

  .projects-rail {
    overflow: hidden;
    cursor: grab;
    -webkit-user-select: none;
    user-select: none;
    border-top: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    background: var(--bg);
  }
  .projects-rail.dragging { cursor: grabbing; }

  .rail-track {
    display: flex;
    width: max-content;
    will-change: transform;
    /* JS sets transform: translate3d(x,0,0) every frame */
  }

  .card {
    flex-shrink: 0;
    width: clamp(260px, 26vw, 340px);
    text-decoration: none;
    color: var(--ink);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    border-right: 1px solid var(--ink);
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }
  .card:last-child { border-right: 0; }
  .card:focus { outline: none; }
  .card:focus-visible { outline: 2px solid var(--ink); outline-offset: -2px; }

  .card-inner {
    width: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ====== POSTER VISUAL ====== */
  .card-visual {
    aspect-ratio: 3 / 4;
    overflow: hidden;
    background: var(--ink-ghost);
    position: relative;
    border-bottom: 1px solid var(--ink);
  }

  /* Photo cards: image fills the poster */
  .card-visual.has-photo {
    background-size: cover;
    background-position: center;
  }

  /* Typographic poster (no photo): the title IS the poster */
  .card-visual.placeholder {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: var(--s-4);
  }
  .poster-type {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .poster-title {
    font-family: 'Fraunces', serif;
    font-weight: 350;
    font-variation-settings: 'opsz' 144, 'SOFT' 30;
    font-size: clamp(28px, 2.5vw, 36px);
    line-height: 0.95;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin-top: auto;
  }
  .poster-year {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: var(--s-3);
  }

  /* ====== CAPTION (under photo posters; hidden on placeholder posters
     because the typography is already on the poster itself) ====== */
  .card-caption {
    padding: 20px var(--s-4) var(--s-4);
    color: var(--ink);
    background: var(--bg);
    flex-shrink: 0;
    position: relative;
  }
  .card-caption-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: var(--s-1);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .card-caption-title {
    font-family: 'Geist', sans-serif;
    font-weight: 500;
    font-size: clamp(15px, 1.4vw, 17px);
    line-height: 1.3;
    letter-spacing: -0.005em;
  }

  /* ====== HOVER: subtle, intentional ======
     Photo & poster visuals stay still. Hover lives only in the caption-
     meta line (year → Voir →). No image zoom, no title bouncing — image
     zooms on hover read as 2018 e-commerce; minimal motion is the modern
     register for editorial sites. */
  .card {
    transition: transform var(--dur-release) var(--ease-release);
  }
  /* Press = the whole card sinks 1px into the rail — a small but felt event */
  .card:active { transform: translateY(1px); }

  .card-caption-meta {
    transition: color var(--dur-release) var(--ease-release);
  }
  .card:hover .card-caption-meta {
    transition: color var(--dur-snap) var(--ease-snap);
  }

  .card .meta-cta {
    display: inline-block;
    overflow: hidden;
    position: relative;
    color: var(--ink-soft);
    transition: color var(--dur-release) var(--ease-release);
  }
  .card:hover .meta-cta {
    color: var(--ink);
    transition: color var(--dur-snap) var(--ease-snap);
  }
  .card .meta-cta-default,
  .card .meta-cta-hover {
    display: inline-block;
    transition: transform var(--dur-release) var(--ease-release);
  }
  .card .meta-cta-hover {
    position: absolute;
    inset: 0;
    transform: translateY(100%);
  }
  .card:hover .meta-cta-default,
  .card:hover .meta-cta-hover {
    transition: transform var(--dur-snap) var(--ease-snap);
  }
  .card:hover .meta-cta-default { transform: translateY(-100%); }
  .card:hover .meta-cta-hover { transform: translateY(0); }

  /* =====================================================
     FOOTER — large, simple, one statement
     ===================================================== */
  .footer {
    padding: var(--s-9) var(--gutter) var(--s-6);
    border-top: 1px solid var(--ink);
  }
  .footer-inner {
    max-width: var(--column);
    margin: 0 auto;
  }
  .footer-headline {
    font-family: 'Fraunces', serif;
    font-weight: 350;
    font-variation-settings: 'opsz' 144, 'SOFT' 30;
    font-size: clamp(32px, 3.7vw, 53px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin: 0 0 var(--s-5) 0;
    color: var(--ink);
  }
  .footer-blocks {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: var(--s-5) var(--s-5);
    max-width: 880px;
  }
  @media (max-width: 880px) {
    .footer-blocks { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 420px) {
    .footer-blocks { grid-template-columns: 1fr; }
  }
  .footer-block {
    display: flex;
    flex-direction: column;
    gap: var(--s-1);
  }
  .footer-label {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .footer-value {
    font-size: 14px;
    line-height: 1.4;
    color: var(--ink);
  }
  /* (Footer-link interactions now live in the unified link block at the
     top of this stylesheet — same vocabulary as nav and lang-switch.) */
  /* The meta block (copyright + last updated) sits as a regular footer-block
     but uses smaller mono type to read as the colophon, not editorial info. */
  .footer-block--meta .footer-value {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    line-height: 1.6;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  /* =====================================================
     PROJECT OVERLAY — opens from bottom on card click.
     Photo on left (40%), text on right (60%); stacks on mobile.
     ===================================================== */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    pointer-events: none;
    visibility: hidden;
  }
  .overlay.open {
    pointer-events: auto;
    visibility: visible;
  }
  .overlay-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(14, 12, 9, 0);
    transition: background var(--dur-reveal) cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .overlay.open .overlay-backdrop {
    background: rgba(14, 12, 9, 0.55);
  }
  .overlay-panel {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 82vh;
    background: var(--bg);
    border-top: 1px solid var(--ink);
    transform: translateY(100%);
    /* Heavy lid: slight reluctance starting, then glides up, then seats. */
    transition: transform var(--dur-reveal) cubic-bezier(0.22, 0.61, 0.36, 1);
    display: flex;
    flex-direction: column;
  }
  .overlay.open .overlay-panel {
    transform: translateY(0);
  }
  .overlay-bar {
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--s-3) var(--gutter);
    border-bottom: 1px solid var(--ink);
  }
  .overlay-counter {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .overlay-controls {
    display: flex;
    align-items: center;
    gap: var(--s-1);
  }
  .overlay-close {
    background: transparent;
    border: 1px solid var(--ink);
    cursor: pointer;
    width: 40px;
    height: 40px;
    color: var(--ink);
    font-family: 'Geist', sans-serif;
    font-size: 18px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background var(--dur-release) var(--ease-release),
                color var(--dur-release) var(--ease-release),
                transform var(--dur-release) var(--ease-release);
  }
  .overlay-close:hover {
    background: var(--ink);
    color: var(--bg);
    transition: background var(--dur-snap) var(--ease-snap),
                color var(--dur-snap) var(--ease-snap),
                transform var(--dur-snap) var(--ease-snap);
  }
  .overlay-close:active { transform: translateY(2px); }

  .overlay-body {
    flex: 1;
    display: grid;
    grid-template-columns: 2fr 3fr;
    overflow: hidden;
  }
  /* Single-column text body for content overlays without a visual side
     (e.g. legal notice). Same panel chrome, different inside. */
  .overlay-body--text {
    grid-template-columns: 1fr;
  }
  .overlay-body--text .overlay-text {
    max-width: 760px;
    margin: 0 auto;
    width: 100%;
  }
  .overlay-visual {
    position: relative;
    background: var(--ink-ghost);
    border-right: 1px solid var(--ink);
    overflow: hidden;
  }
  .overlay-visual.placeholder {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: var(--s-6);
  }
  .overlay-visual.placeholder .poster-type {
    font-size: 12px;
  }
  .overlay-visual.placeholder .poster-title {
    font-size: clamp(36px, 5vw, 64px);
    line-height: 0.95;
    letter-spacing: -0.025em;
  }
  .overlay-visual.placeholder .poster-year {
    font-size: 12px;
  }
  /* Image layer — covers visual; multiple stacked, faded by .active */
  .overlay-visual-img {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity var(--dur-snap) var(--ease-snap);
    pointer-events: none;
  }
  .overlay-visual-img.active { opacity: 1; }
  /* Click zones for prev/next when multiple photos */
  .overlay-visual-zones {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    z-index: 1;
  }
  .overlay-visual-zone {
    cursor: pointer;
    background: transparent;
    border: 0;
    padding: 0;
    transition: background var(--dur-release) var(--ease-release);
  }
  .overlay-visual-zone:hover {
    background: linear-gradient(var(--bg-dir), rgba(14,12,9,0.04), transparent 30%);
    transition: background var(--dur-snap) var(--ease-snap);
  }
  .overlay-visual-zone.prev { --bg-dir: to right; }
  .overlay-visual-zone.next { --bg-dir: to left; }
  /* Dot indicators for multi-photo */
  .overlay-visual-dots {
    position: absolute;
    bottom: var(--s-3);
    left: var(--s-3);
    display: flex;
    gap: 6px;
    z-index: 2;
    pointer-events: none;
  }
  .overlay-visual-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.45);
    transition: background var(--dur-snap) var(--ease-snap);
  }
  .overlay-visual-dot.active { background: rgba(255, 255, 255, 1); }
  /* Photo counter */
  .overlay-visual-counter {
    position: absolute;
    bottom: var(--s-3);
    right: var(--s-3);
    z-index: 2;
    pointer-events: none;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.85);
    background: rgba(14, 12, 9, 0.45);
    padding: 4px 8px;
  }

  .overlay-text {
    padding: var(--s-7) var(--s-6);
    overflow-y: auto;
  }
  .overlay-meta {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: var(--s-4);
    margin-bottom: var(--s-6);
    padding-bottom: var(--s-5);
    /* Full-bleed separator: pull the line out to the edges of the
       text column, matching every other rule on the site. The negative
       horizontal margins absorb the parent's padding. */
    margin-left: calc(var(--s-6) * -1);
    margin-right: calc(var(--s-6) * -1);
    padding-left: var(--s-6);
    padding-right: var(--s-6);
    border-bottom: 1px solid var(--ink);
  }
  .overlay-meta-block .footer-label {
    margin-bottom: var(--s-1);
  }
  .overlay-meta-block .footer-value {
    font-size: 14px;
    line-height: 1.4;
  }
  .overlay-title {
    font-family: 'Fraunces', serif;
    font-weight: 350;
    font-variation-settings: 'opsz' 144, 'SOFT' 30;
    font-size: clamp(36px, 4.5vw, 56px);
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin: 0 0 var(--s-5) 0;
  }
  .overlay-desc {
    font-family: 'Geist', sans-serif;
    font-size: clamp(15px, 1.4vw, 18px);
    line-height: 1.6;
    color: var(--ink);
    max-width: 60ch;
  }

  /* ====== LEGAL OVERLAY content ======
     Reuses the project-overlay panel; this just styles the prose inside. */
  .legal-section {
    margin-top: var(--s-6);
  }
  .legal-section:first-of-type {
    margin-top: 0;
  }
  .legal-section h3 {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 var(--s-3) 0;
  }
  .legal-section p,
  .legal-section dd {
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
    margin: 0 0 var(--s-2) 0;
    max-width: 60ch;
  }
  .legal-section dl {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 6px var(--s-3);
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
  }
  .legal-section dt {
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .legal-section dd {
    margin: 0;
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    text-transform: none;
    letter-spacing: 0;
  }
  .legal-section a {
    color: var(--ink);
    text-decoration: underline;
    text-decoration-thickness: 0.5px;
    text-underline-offset: 3px;
  }

  @media (max-width: 720px) {
    .overlay-panel { height: 92vh; }
    .overlay-body {
      grid-template-columns: 1fr;
      grid-template-rows: 40vh 1fr;
    }
    .overlay-visual { border-right: 0; border-bottom: 1px solid var(--ink); }
    .overlay-text { padding: var(--s-5) var(--s-4); }
    .overlay-meta {
      grid-template-columns: 1fr 1fr;
      gap: var(--s-3);
      margin-left: calc(var(--s-4) * -1);
      margin-right: calc(var(--s-4) * -1);
      padding-left: var(--s-4);
      padding-right: var(--s-4);
    }
  }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    :root { --gutter: 20px; }
    .card { width: 220px; }
  }

  /* =====================================================
     MOBILE — ≤ 768px
     ---------------------------------------------------
     Goal: keep the editorial register, the type voice, and
     the mechanical motion language — but make every touch
     target reachable, every line of text legible without
     pinch, and every section paced for a tall narrow screen.

     Ground rules followed below:
       · spacing is compressed across the modular scale
         (s-9/s-10 → s-6, s-7 → s-5) so the page doesn't
         feel like a series of empty rooms
       · all interactive elements ≥ 44px touch target
       · the floating brand block is hard-pinned to the
         spacer on mobile (the desktop scroll-morph would
         leave the giant 3-line title sitting on top of
         the body content), so the brand "morphs" by simply
         scrolling away with the spacer underneath it
       · projects rail keeps its physics — touchstart/move
         are already wired — but cards get their own tuned
         width so they peek instead of dominating
     ===================================================== */
  @media (max-width: 768px) {
    :root {
      --gutter: 16px;
      --s-9: 64px;
      --s-10: 72px;
    }

    /* ---------- HEADER ---------- */
    .header {
      top: 12px;
      left: 12px;
      right: 12px;
    }
    .header-right {
      gap: var(--s-3);
      padding: 8px 12px;
      /* slightly more solid than desktop's 0.78 — on mobile the
         hero-brand can sit close to or behind the header during
         the morph, and a faint backdrop disappears against it */
      background: rgba(255, 255, 255, 0.92);
    }
    .header-nav {
      gap: var(--s-2);
      font-size: 11px;
    }
    .header-nav a {
      padding: 6px 0;        /* taller touch target */
    }
    .lang-switch {
      font-size: 11px;
    }
    .lang-switch button {
      padding: 6px 2px;       /* taller touch target */
      min-width: 22px;
    }

    /* ---------- HERO BRAND ----------
       Same scroll-morph as desktop — fixed brand block scales down
       toward the top-left corner. We only override the *starting*
       size so the 3-line title fits a narrow viewport at rest.
       The morph end-state (44px in the corner) is identical to
       desktop, so the mechanical-mill choreography reads the same
       on a phone as on a laptop. */
    .hero-brand {
      --brand-size: clamp(36px, 11vw, 56px);
      --brand-gap: calc(var(--brand-size) * 0.5);
    }
    .hero-brand-spacer {
      --brand-size: clamp(36px, 11vw, 56px);
      --brand-gap: calc(var(--brand-size) * 0.5);
      margin-bottom: var(--s-4);
    }

    /* ---------- HERO ---------- */
    .hero {
      min-height: auto;
      padding: 96px var(--gutter) var(--s-7);
      align-items: flex-start;
    }
    .hero-meta {
      font-size: 17px;
      line-height: 1.5;
      max-width: none;
    }

    /* ---------- EDITORIAL ---------- */
    .editorial {
      padding: var(--s-7) var(--gutter);
    }
    .editorial-headline {
      font-size: clamp(28px, 7vw, 36px);
      margin-bottom: var(--s-4);
    }
    .editorial-body {
      gap: var(--s-4);
    }
    .editorial-body p {
      font-size: 16px;
      line-height: 1.55;
    }

    /* ---------- PROJECTS ---------- */
    .projects {
      padding: var(--s-7) 0;
    }
    .projects-head {
      margin-bottom: var(--s-5);
      gap: var(--s-3);
      align-items: flex-start;
    }
    .projects-headline {
      font-size: clamp(28px, 7vw, 36px);
      flex: 1 1 auto;
    }
    .projects-controls {
      gap: var(--s-2);
    }
    /* Bigger arrow buttons — 44px is the iOS recommended tap target.
       The visual border/box is the same size as desktop visually but
       gains a few pixels of comfortable hit area. */
    .arrow-btn {
      width: 44px;
      height: 44px;
      font-size: 18px;
    }

    /* Cards: a hair narrower than the 220px desktop-mobile floor so
       the next card peeks visibly on a 360–390px viewport, which
       signals "this rail scrolls" without needing a hint label. */
    .card { width: 78vw; max-width: 280px; }

    /* The card aspect (3/4) is fine but the caption sat tight on the
       photo. Loosen the rhythm. */
    .card-caption {
      padding: var(--s-3) var(--s-3) var(--s-3);
    }
    .poster-title {
      font-size: clamp(24px, 6vw, 30px);
    }

    /* ---------- FOOTER ---------- */
    .footer {
      padding: var(--s-7) var(--gutter) var(--s-5);
    }
    .footer-headline {
      font-size: clamp(28px, 7vw, 36px);
      margin-bottom: var(--s-4);
    }
    .footer-blocks {
      grid-template-columns: 1fr 1fr;
      gap: var(--s-4);
    }
    .footer-block--meta {
      grid-column: 1 / -1;
      margin-top: var(--s-2);
    }

    /* ---------- OVERLAY ----------
       The 720px rule above already stacks the body and gives the
       visual a 40vh window, but the text padding was still desktop-
       scale. Tighten it and bring the title down a notch so two-
       finger reading flows. */
    .overlay-panel { height: 94vh; }
    .overlay-bar {
      padding: var(--s-2) var(--gutter);
    }
    .overlay-close {
      width: 44px;
      height: 44px;
    }
    .overlay-text {
      padding: var(--s-5) var(--gutter) var(--s-7);
    }
    .overlay-meta {
      grid-template-columns: 1fr 1fr;
      gap: var(--s-3);
      margin-bottom: var(--s-5);
      padding-bottom: var(--s-4);
      margin-left: calc(var(--gutter) * -1);
      margin-right: calc(var(--gutter) * -1);
      padding-left: var(--gutter);
      padding-right: var(--gutter);
    }
    .overlay-title {
      font-size: clamp(28px, 7vw, 40px);
      margin-bottom: var(--s-3);
    }
    .overlay-desc {
      font-size: 16px;
      line-height: 1.6;
    }
    .overlay-visual.placeholder {
      padding: var(--s-4);
    }
    .overlay-visual.placeholder .poster-title {
      font-size: clamp(28px, 8vw, 44px);
    }
  }

  /* Very small phones (≤ 380px): one more squeeze */
  @media (max-width: 380px) {
    :root { --gutter: 14px; }
    .header-nav { gap: 10px; }
    .footer-blocks { grid-template-columns: 1fr; }
    .card { width: 82vw; }
    .hero {
      padding-top: 88px;
    }
  }

  /* Disable :hover styling on touch devices — sticky-hover after a tap
     on cards/links/buttons made the meta-cta and underlines stay "on"
     until the next tap, which read as a bug. We re-route the hover
     vocabulary to :active only when the input is coarse. */
  @media (hover: none) and (pointer: coarse) {
    .card:hover .card-caption-meta,
    .card:hover .meta-cta,
    .card:hover .meta-cta-default,
    .card:hover .meta-cta-hover {
      transition: none;
    }
    .card:hover .meta-cta-default { transform: translateY(0); }
    .card:hover .meta-cta-hover { transform: translateY(100%); }
    .card:hover .meta-cta { color: var(--ink-soft); }

    .arrow-btn:hover {
      background: transparent;
      color: var(--ink);
    }
    .arrow-btn:hover span { transform: none; }

    .header-nav a:hover::after,
    .footer-value a:hover::after {
      transform: scaleX(0);
    }

    .overlay-close:hover {
      background: transparent;
      color: var(--ink);
    }

    /* Keep the active language underline visible — that one is state,
       not hover, so it should stay. */
    .lang-switch button.active::after { transform: scaleX(1); }
  }
</style>
</head>
<body>

  <!-- HEADER: only nav (logo is the morphed hero-brand) -->
  <header class="header">
    <div class="header-spacer"></div>
    <div class="header-right">
      <nav class="header-nav">
        <a href="#projects" data-i18n="navProjects"></a>
        <a href="#contact" data-i18n="navContact"></a>
      </nav>
      <div class="lang-switch" id="langSwitch" role="group" aria-label="Language">
        <button data-lang="fr" class="active">FR</button>
        <span class="sep">/</span>
        <button data-lang="en">EN</button>
      </div>
    </div>
  </header>

  <!-- HERO-BRAND: floating fixed block — logo + title travel together -->
  <div class="hero-brand" id="heroBrand">
    <svg class="hero-mark" viewBox="-12 -2 98 82" aria-hidden="true">
        <defs>
          <clipPath id="wheelClip">
            <!-- Upper-LEFT quadrant of the wheel only.
                 Wheel sits at the waterline: center (20, 77.5), radius 28.
                 Top of visible arc reaches y≈49.5 — half-way up the wall.
                 Wheel is offset 0.5px above the building's bottom edge so
                 a 1px-stroke horizontal spoke seats flush with the wall. -->
            <rect x="-12" y="-2" width="32" height="80"/>
          </clipPath>
          <!-- Building mask: paint the chimney + building solid white
               (visible), then knock out the windows and door in black
               (cut out). Anything not painted in the mask is invisible.
               This makes the windows and door true cut-outs that show
               whatever is behind the SVG (the page background, a colored
               header, etc.) — they're holes in the shape, not white
               stickers on top of it. -->
          <mask id="buildingCutouts" maskUnits="userSpaceOnUse"
                x="-12" y="-2" width="98" height="82">
            <!-- everything starts hidden -->
            <rect x="-12" y="-2" width="98" height="82" fill="black"/>
            <!-- show the chimney + building silhouette -->
            <rect x="26" y="2" width="8" height="20" fill="white"/>
            <polygon points="20,78 20,22 51,4 82,22 82,78" fill="white"/>
            <!-- knock out the two windows and the door -->
            <rect x="26" y="28" width="8" height="8" fill="black"/>
            <rect x="68" y="28" width="8" height="8" fill="black"/>
            <!-- Door: extends 2px past the building's bottom edge (y=78)
                 to ensure mask anti-aliasing at the seam is fully erased.
                 The extra extent falls outside the building polygon and
                 is harmless. -->
            <rect x="68" y="54" width="8" height="26" fill="black"/>
          </mask>
        </defs>
        <g clip-path="url(#wheelClip)">
          <!-- Wheel rim: radius 28, ring 1 wide, centered at (20, 77).
               Wheel is offset 1px up from the building's bottom edge
               so a horizontal spoke (1px stroke, anti-aliased to two
               half-pixel rows) seats visually flush with the wall.
               The earlier 0.5px shift was too subtle once the SVG was
               scaled down by the layout. -->
          <path d="M 20 49 A 28 28 0 1 1 20 105 A 28 28 0 1 1 20 49 Z M 20 50 A 27 27 0 1 0 20 104 A 27 27 0 1 0 20 50 Z" fill="#0E0C09" fill-rule="evenodd"/>
          <g class="wheel-spin">
            <!-- 8 spokes through center (20, 77), reach r=28. -->
            <line x1="-8" y1="77" x2="48" y2="77" stroke="#0E0C09" stroke-width="1"/>
            <line x1="-5.9" y1="66.3" x2="45.9" y2="87.7" stroke="#0E0C09" stroke-width="1"/>
            <line x1="0.2" y1="57.2" x2="39.8" y2="96.8" stroke="#0E0C09" stroke-width="1"/>
            <line x1="9.3" y1="51.1" x2="30.7" y2="102.9" stroke="#0E0C09" stroke-width="1"/>
            <line x1="20" y1="49" x2="20" y2="105" stroke="#0E0C09" stroke-width="1"/>
            <line x1="30.7" y1="51.1" x2="9.3" y2="102.9" stroke="#0E0C09" stroke-width="1"/>
            <line x1="39.8" y1="57.2" x2="0.2" y2="96.8" stroke="#0E0C09" stroke-width="1"/>
            <line x1="45.9" y1="66.3" x2="-5.9" y2="87.7" stroke="#0E0C09" stroke-width="1"/>
          </g>
          <circle cx="20" cy="77" r="2" fill="#0E0C09"/>
        </g>
        <!-- One black rect, masked: paints both the chimney and the
             building shape, with the windows and door punched out. -->
        <rect x="-12" y="-2" width="98" height="82"
              fill="#0E0C09" mask="url(#buildingCutouts)"/>
    </svg>
    <h1 class="hero-title" id="heroTitle">Moulin<br>Méli<br>Mêl’eaux</h1>
  </div>

  <!-- HERO: very quiet — name + one fact -->
  <section class="hero">
    <div class="hero-inner">
      <div class="hero-brand-spacer" id="heroBrandSpacer">
        <div class="spacer-mark"></div>
        <div class="spacer-title">Moulin<br>Méli<br>Mêl’eaux</div>
      </div>
      <p class="hero-meta" data-i18n="heroMeta"></p>
    </div>
  </section>

  <!-- LE LIEU / THE PLACE -->
  <section class="editorial" id="lieu">
    <div class="editorial-inner">
      <h2 class="editorial-headline" data-i18n="lieuHead"></h2>
      <div class="editorial-body" data-i18n-html="lieuBody"></div>
    </div>
  </section>

  <!-- PROJECTS: full-bleed -->
  <section class="projects" id="projects">
    <div class="projects-head">
      <h2 class="projects-headline" data-i18n="projectsHead"></h2>
      <div class="projects-controls">
        <div class="arrow-group">
          <button class="arrow-btn prev" id="prevBtn" aria-label="previous"><span>←</span></button>
          <button class="arrow-btn next" id="nextBtn" aria-label="next"><span>→</span></button>
        </div>
      </div>
    </div>

    <div class="projects-rail" id="rail">
      <div class="rail-track" id="railTrack"></div>
    </div>
  </section>

  <!-- LE MOULIN / THE MILL -->
  <section class="editorial" id="moulin">
    <div class="editorial-inner">
      <h2 class="editorial-headline" data-i18n="moulinHead"></h2>
      <div class="editorial-body" data-i18n-html="moulinBody"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer" id="contact">
    <div class="footer-inner">
      <h2 class="footer-headline" data-i18n="contactHead"></h2>
      <div class="footer-blocks">
        <div class="footer-block">
          <div class="footer-label" data-i18n="addressLabel"></div>
          <div class="footer-value" data-i18n="footerAddress"></div>
        </div>
        <div class="footer-block">
          <div class="footer-label" data-i18n="emailLabel"></div>
          <div class="footer-value">
            <a href="mailto:hello@moulinmelimeleaux.fr">hello@moulinmelimeleaux.fr</a>
          </div>
        </div>
        <div class="footer-block">

    var currentLang = 'fr';

    function getDict() { return DICT[currentLang]; }

    function getDesc(p) { return p.desc[currentLang] || p.desc.fr; }

    function applyLang(lang) {
      currentLang = lang;
      var d = getDict();
      document.documentElement.setAttribute('lang', lang);

      // Plain text bindings
      var plainEls = document.querySelectorAll('[data-i18n]');
      plainEls.forEach(function (el) {
        var key = el.getAttribute('data-i18n');
        var val = d[key];
        if (typeof val === 'string') {
          // preserve newlines as <br> for footer address
          if (key === 'footerAddress') {
            el.innerHTML = val.split('\n').map(function (line) {
              return line.replace(/&/g, '&amp;').replace(/</g, '&lt;');
            }).join('<br>');
          } else {
            el.textContent = val;
          }
        }
      });

      // Multi-paragraph bindings
      var htmlEls = document.querySelectorAll('[data-i18n-html]');
      htmlEls.forEach(function (el) {
        var key = el.getAttribute('data-i18n-html');
        var val = d[key];
        if (Array.isArray(val)) {
          el.innerHTML = val.map(function (p) { return '<p>' + p + '</p>'; }).join('');
        } else if (typeof val === 'string') {
          // Pre-formed HTML (e.g. legal notice with <section>/<dl> markup).
          // Caller is responsible for the markup — only used for trusted
          // content from our own DICT, never from user input.
          el.innerHTML = val;
        }
      });

      // Lang switch active state
      var btns = document.querySelectorAll('.lang-switch [data-lang]');
      btns.forEach(function (b) {
        if (b.getAttribute('data-lang') === lang) b.classList.add('active');
        else b.classList.remove('active');
      });

      // Re-render cards with new language
      if (typeof window.renderCards === 'function') window.renderCards();
      // Notify other modules (overlay, etc.)
      window.dispatchEvent(new Event('langChange'));
    }

    /* RENDER CARDS */
    (function () {
      var track = document.getElementById('railTrack');
      function makeCard(p, index) {
        var card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.setAttribute('data-index', index);

        var inner = document.createElement('div');
        inner.className = 'card-inner';

        var visual = document.createElement('div');
        if (p.photo) {
          visual.className = 'card-visual has-photo';
          visual.style.backgroundImage = "url('" + p.photo + "')";
        } else {
          // Typographic poster: title is the visual.
          visual.className = 'card-visual placeholder';
          visual.innerHTML =
            '<div class="poster-type">' + getTypeLabel(p.type) + '</div>' +
            '<div class="poster-title">' + getTitle(p) + '</div>' +
            '<div class="poster-year">' + p.when + '</div>';
        }

        var caption = document.createElement('div');
        caption.className = 'card-caption';

        // For photo cards, caption shows type + year + title.
        // For typographic posters, the title is on the poster — caption shows
        // a short blurb instead, plus the same hover CTA pattern.
        if (p.photo) {
          caption.innerHTML =
            '<div class="card-caption-meta">' +
              '<span>' + getTypeLabel(p.type) + '</span>' +
              '<span class="meta-cta">' +
                '<span class="meta-cta-default">' + p.when + '</span>' +
                '<span class="meta-cta-hover">' + (getDict().viewLabel || 'View →') + '</span>' +
              '</span>' +
            '</div>' +
            '<div class="card-caption-title">' + getTitle(p) + '</div>';
        } else {
          caption.innerHTML =
            '<div class="card-caption-meta">' +
              '<span>' + getDescShort(p) + '</span>' +
              '<span class="meta-cta">' +
                '<span class="meta-cta-default">→</span>' +
                '<span class="meta-cta-hover">' + (getDict().viewLabel || 'View →') + '</span>' +
              '</span>' +
            '</div>';
        }

        inner.appendChild(visual);
        inner.appendChild(caption);

        card.appendChild(inner);
        return card;
      }

      function getDescShort(p) {
        var d = (p.desc && (p.desc[currentLang] || p.desc.fr)) || '';
        // first ~28 chars, on word boundary
        if (d.length <= 30) return d;
        var cut = d.slice(0, 30);
        var lastSpace = cut.lastIndexOf(' ');
        return (lastSpace > 0 ? cut.slice(0, lastSpace) : cut) + '…';
      }

      function renderCards() {
        track.innerHTML = '';
        // Three sequential copies of the project list. The middle copy is the
        // "real" one; left and right are clones used to mask the seam during
        // bidirectional looping. Click-to-open still uses index modulo length,
        // so a clone card opens the same overlay as the original.
        for (var copy = 0; copy < 3; copy++) {
          projects.forEach(function (p, i) { track.appendChild(makeCard(p, i)); });
        }
        // Notify rail driver that layout may have changed (font load, lang switch)
        if (window.__railOnLayout) window.__railOnLayout();
      }
      window.renderCards = renderCards;
      renderCards();
    })();

       close with × / Esc / backdrop click. Stagger content reveal
